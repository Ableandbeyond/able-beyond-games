<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensory Room</title>
  <meta name="description" content="A calming sensory web application for children with Special Educational Needs (SEN) and Autism (ASD).">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-default">

  <!-- SVG Sprite for Icons (Zero external dependencies) -->
  <svg style="display: none;" aria-hidden="true">
    <symbol id="icon-bubble" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <path d="M12 16v-4"></path>
      <path d="M12 8h.01"></path>
    </symbol>
    <symbol id="icon-disco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2v20"></path>
      <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
    </symbol>
    <symbol id="icon-soundboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"></path>
      <circle cx="6" cy="18" r="3"></circle>
      <circle cx="18" cy="16" r="3"></circle>
    </symbol>
    <symbol id="icon-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </symbol>
    <symbol id="icon-unmute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
    </symbol>
    <symbol id="icon-freeze" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="4" width="4" height="16"></rect>
      <rect x="14" y="4" width="4" height="16"></rect>
    </symbol>
    <symbol id="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="5 3 19 12 5 21 5 3"></polygon>
    </symbol>
    <symbol id="icon-fullscreen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </symbol>
    <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </symbol>
  </svg>

  <nav class="global-nav" aria-label="Main Navigation">
    <div class="nav-modes">
      <button class="nav-btn active" data-mode="bubble" aria-pressed="true" aria-label="Bubble Tubes Mode">
        <svg aria-hidden="true"><use href="#icon-bubble"></use></svg>
        <span>Bubble Tubes</span>
      </button>
      <button class="nav-btn" data-mode="disco" aria-pressed="false" aria-label="Cosmic Disco Mode">
        <svg aria-hidden="true"><use href="#icon-disco"></use></svg>
        <span>Cosmic Disco</span>
      </button>
      <button class="nav-btn" data-mode="soundboard" aria-pressed="false" aria-label="Interactive Soundboard Mode">
        <svg aria-hidden="true"><use href="#icon-soundboard"></use></svg>
        <span>Soundboard</span>
      </button>
    </div>
    
    <div class="nav-controls">
      <button id="btn-mute" class="nav-btn icon-only" aria-label="Toggle Audio Mute" aria-pressed="false">
        <svg class="icon-mute-state" aria-hidden="true"><use href="#icon-unmute"></use></svg>
      </button>
      <button id="btn-freeze" class="nav-btn icon-only" aria-label="Toggle Animation Freeze" aria-pressed="false">
        <svg class="icon-freeze-state" aria-hidden="true"><use href="#icon-freeze"></use></svg>
      </button>
      <button id="btn-fullscreen" class="nav-btn icon-only" aria-label="Toggle Fullscreen">
        <svg aria-hidden="true"><use href="#icon-fullscreen"></use></svg>
      </button>
      <button id="btn-settings" class="nav-btn icon-only" aria-label="Open Settings" aria-expanded="false" aria-controls="settings-panel">
        <svg aria-hidden="true"><use href="#icon-settings"></use></svg>
      </button>
    </div>
  </nav>

  <main id="main-content" aria-live="polite">
    <!-- Mode A: Bubble Tubes -->
    <section id="mode-bubble" class="mode-container active" aria-label="Bubble Tubes">
      <div class="bubble-tubes-wrapper">
        <canvas id="tube-canvas-1" class="bubble-tube" aria-label="Interactive Bubble Tube 1" role="button" tabindex="0"></canvas>
        <canvas id="tube-canvas-2" class="bubble-tube" aria-label="Interactive Bubble Tube 2" role="button" tabindex="0"></canvas>
        <canvas id="tube-canvas-3" class="bubble-tube" aria-label="Interactive Bubble Tube 3" role="button" tabindex="0"></canvas>
      </div>
    </section>

    <!-- Mode B: Cosmic Disco -->
    <section id="mode-disco" class="mode-container hidden" aria-label="Cosmic Disco">
      <canvas id="disco-canvas" class="fullscreen-canvas" aria-label="Interactive cosmic lava lamp" role="button" tabindex="0"></canvas>
    </section>

    <!-- Mode C: Interactive Soundboard -->
    <section id="mode-soundboard" class="mode-container hidden" aria-label="Interactive Soundboard">
      <div class="soundboard-grid">
        <button class="shape-btn circle" data-shape="circle" aria-label="Play Circle sound"></button>
        <button class="shape-btn triangle" data-shape="triangle" aria-label="Play Triangle sound"></button>
        <button class="shape-btn square" data-shape="square" aria-label="Play Square sound"></button>
        <button class="shape-btn star" data-shape="star" aria-label="Play Star sound"></button>
        <button class="shape-btn hexagon" data-shape="hexagon" aria-label="Play Hexagon sound"></button>
        <button class="shape-btn heart" data-shape="heart" aria-label="Play Heart sound"></button>
      </div>
    </section>
  </main>

  <!-- Settings Panel overlay -->
  <div id="settings-overlay" class="overlay hidden" aria-hidden="true"></div>
  <aside id="settings-panel" class="panel hidden" aria-hidden="true" aria-label="Settings panel">
    <header class="panel-header">
      <h2>Settings</h2>
      <button id="btn-close-settings" class="nav-btn icon-only" aria-label="Close Settings">
        <svg aria-hidden="true"><use href="#icon-close"></use></svg>
      </button>
    </header>
    <div class="panel-content">
      <div class="setting-group">
        <label for="master-volume">Master Volume</label>
        <input type="range" id="master-volume" min="0" max="1" step="0.05" value="0.5">
      </div>
      <div class="setting-group">
        <label for="animation-speed">Animation Speed</label>
        <input type="range" id="animation-speed" min="0.1" max="2" step="0.1" value="1">
      </div>
      <div class="setting-group">
        <label for="bubble-density">Bubble/Particle Density</label>
        <input type="range" id="bubble-density" min="0.5" max="2" step="0.1" value="1">
      </div>
      <div class="setting-group checkbox-group">
        <input type="checkbox" id="high-contrast" class="custom-checkbox">
        <label for="high-contrast">High Contrast Mode</label>
      </div>
      <div class="setting-group checkbox-group">
        <input type="checkbox" id="reduced-motion" class="custom-checkbox">
        <label for="reduced-motion">Reduced Motion</label>
      </div>
    </div>
  </aside>

  <!-- Scripts -->
  <script src="app.js"></script>
  <script src="audio.js"></script>
  <script src="particles.js"></script>
  <script src="bubbletube.js"></script>
  <script src="disco.js"></script>
  <script src="soundboard.js"></script>
</body>
</html>
